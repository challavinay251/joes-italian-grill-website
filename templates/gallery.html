{% extends 'base.html' %}
{% block content %}

<style>
:root {
    --bg-dark: #020617;
    --card-bg: rgba(255,255,255,0.04);
    --border-soft: rgba(255,255,255,0.08);
    --text-muted: #94a3b8;
    --accent: #6366f1;
}

/* BASE */
body {
    background: radial-gradient(circle at top, #0f172a, var(--bg-dark));
    font-family: 'Poppins', sans-serif;
    color: #fff;
}

/* HEADER */
.gallery-header {
    text-align: center;
    margin-bottom: 50px;
}

.gallery-title {
    font-size: 40px;
    font-weight: 800;
    background: linear-gradient(to right, #fff, #a5b4fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.gallery-subtitle {
    color: var(--text-muted);
    font-size: 15px;
    margin-top: 8px;
}

/* MASONRY GRID */
.gallery-grid {
    column-count: 3;
    column-gap: 20px;
}

@media (max-width: 992px) {
    .gallery-grid {
        column-count: 2;
    }
}

@media (max-width: 576px) {
    .gallery-grid {
        column-count: 1;
    }
}

/* CARD */
.gallery-card {
    display: inline-block;
    width: 100%;
    margin-bottom: 20px;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    background: var(--card-bg);
    border: 1px solid var(--border-soft);
    transition: all 0.3s ease;
}

/* IMAGE (no forced height) */
.gallery-card img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.4s ease, filter 0.3s ease;
}

/* OVERLAY */
.gallery-overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

/* TITLE */
.gallery-overlay span {
    font-size: 15px;
    font-weight: 500;
    color: #f1f5f9;
}

/* HOVER */
.gallery-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
}

.gallery-card:hover img {
    transform: scale(1.04);
    filter: brightness(0.95);
}

/* EMPTY STATE */
.empty-state {
    text-align: center;
    padding: 100px 20px;
    border-radius: 20px;
    background: var(--card-bg);
    border: 1px dashed var(--border-soft);
}

.empty-state h3 {
    font-size: 22px;
}

.empty-state p {
    color: var(--text-muted);
    margin-top: 5px;
}

</style>

<div class="container">

    <!-- HEADER -->
    <div class="gallery-header">
        <h2 class="gallery-title">Our Gallery</h2>
        <p class="gallery-subtitle">Captured moments & meaningful memories</p>
    </div>

    {% if images %}
    <div class="gallery-grid">

        {% for img in images %}
        <div class="gallery-card">

            <img src="{{ img.get_image }}" alt="{{ img.title }}">

            <div class="gallery-overlay">
                <span>{{ img.title }}</span>
            </div>

        </div>
        {% endfor %}

    </div>

    {% else %}
    <div class="empty-state">
        <h3>No Images Yet</h3>
        <p>Start uploading moments to bring your gallery to life.</p>
    </div>
    {% endif %}

</div>

{% endblock %}
