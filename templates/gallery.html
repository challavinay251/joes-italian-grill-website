{% extends 'base.html' %}
{% block content %}

<style>

/* SECTION */
.gallery-section {
    padding: 20px 10px;
}

/* TITLE */
.gallery-title {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 700;
}

/* GRID */
.gallery-grid {
    column-count: 3;
    column-gap: 16px;
}

@media (max-width: 992px) {
    .gallery-grid { column-count: 2; }
}

@media (max-width: 576px) {
    .gallery-grid {
        column-count: 1;
        padding: 0 5px;
    }
}

/* CARD */
.gallery-card {
    display: inline-block;
    width: 100%;
    margin-bottom: 16px;
    border-radius: 14px;
    overflow: hidden;
    background: #fff;
    border: 1px solid #eee;
    transition: 0.3s ease;
}

.gallery-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* IMAGE */
.gallery-card img {
    width: 100%;
    height: auto;
    display: block;
}

/* EMPTY STATE */
.empty-state {
    text-align: center;
    padding: 60px 15px;
    border-radius: 14px;
    background: #fff;
    border: 1px dashed #ddd;
    max-width: 420px;
    margin: 40px auto;
}

.empty-icon {
    font-size: 42px;
    margin-bottom: 10px;
}

.empty-state h4 {
    font-weight: 600;
    margin-bottom: 8px;
}

.empty-state p {
    color: #666;
    font-size: 14px;
}

/* MOBILE TWEAKS */
@media (max-width: 576px) {

    .gallery-title {
        font-size: 20px;
    }

    .empty-state {
        padding: 40px 15px;
    }

    .empty-icon {
        font-size: 36px;
    }

}
</style>

<div class="container gallery-section">

    <h2 class="gallery-title">Our Gallery</h2>

    {% if images %}
    <div class="gallery-grid">

        {% for img in images %}
        <div class="gallery-card">
            <img src="{{ img.get_image }}" alt="{{ img.title }}">
        </div>
        {% endfor %}

    </div>

    {% else %}
    <!-- EMPTY STATE -->
    <div class="empty-state">
        <div class="empty-icon">📸</div>
        <h4>Beautiful Moments Coming Soon</h4>
        <p>
            We’re preparing to showcase our delicious dishes and special moments.
            Stay tuned for updates!
        </p>
    </div>
    {% endif %}

</div>

{% endblock %}
