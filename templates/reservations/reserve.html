{% extends 'base.html' %}
{% block content %}

<style>
body {
    background: #f4f6f8;
    color: #222;
    font-family: 'Segoe UI', sans-serif;
}

/* TITLE */
h2 {
    font-weight: 700;
    color: #222;
}

/* FORM BOX */
.form-box {
    max-width: 600px;
    margin: auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 18px;
    border: 1px solid #eaeaea;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* LABEL */
label {
    font-size: 13px;
    color: #666;
    margin-bottom: 4px;
    display: block;
}

/* INPUT */
input, textarea {
    width: 100%;
    margin-bottom: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: #fff;
    color: #222;
    font-size: 14px;
    transition: all 0.2s ease;
}

/* FOCUS */
input:focus, textarea:focus {
    outline: none;
    border-color: #e67e22;
    box-shadow: 0 0 0 2px rgba(230,126,34,0.15);
}

/* DATE & TIME ICON FIX */
input[type="date"],
input[type="time"] {
    cursor: pointer;
}

input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(0); /* light theme fix */
    cursor: pointer;
}

/* BUTTON */
button {
    width: 100%;
    background: linear-gradient(45deg, #f39c12, #e67e22);
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-weight: 700;
    color: #fff;
    transition: 0.25s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(230,126,34,0.3);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* ALERTS */
.alert-success {
    background: #eafaf1;
    color: #27ae60;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 15px;
    border: 1px solid #c3f0d5;
}

.alert-error {
    background: #fdecea;
    color: #c0392b;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 15px;
    border: 1px solid #f5c6cb;
}

/* GRID */
.form-row {
    display: flex;
    gap: 12px;
}

.form-row > div {
    flex: 1;
}

/* MOBILE */
@media (max-width: 768px) {
    .form-row {
        flex-direction: column;
    }

    .form-box {
        padding: 20px;
    }
}
</style>

<h2 class="text-center mb-4">📅 Reserve Your Table</h2>

<div class="form-box">

    {% if success %}
        <div class="alert-success">
            ✅ Reservation confirmed! Check your email.
        </div>
    {% endif %}

    {% if error %}
        <div class="alert-error">
            ⚠ {{ error }}
        </div>
    {% endif %}

    <form method="POST" id="reserveForm">
        {% csrf_token %}

        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter your name" required>

        <div class="form-row">
            <div>
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter email" required>
            </div>
            <div>
                <label>Phone</label>
                <input type="text" name="phone" placeholder="Enter phone number" required>
            </div>
        </div>

        <div class="form-row">
            <div>
                <label>Select Date</label>
                <input type="date" name="date" min="{{ today }}" required>
            </div>
            <div>
                <label>Select Time</label>
                <input type="time" name="time" min="10:00" max="23:00" required>
            </div>
        </div>

        <label>Guests</label>
        <input type="number" name="guests" min="1" max="20" placeholder="Number of guests" required>

        <label>Special Request</label>
        <textarea name="message" placeholder="Optional"></textarea>

        <button type="submit" id="submitBtn">Reserve Now</button>

    </form>

</div>

<script>
const form = document.getElementById("reserveForm");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", function() {
    btn.innerText = "Booking...";
    btn.disabled = true;
});
</script>

{% endblock %}
