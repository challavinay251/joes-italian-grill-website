{% extends 'base.html' %}
{% block content %}

<style>
body {
    background: #0b0b0b;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
}

/* TITLE */
h2 {
    font-weight: 700;
}

/* 🔥 FORM CONTAINER */
.form-box {
    max-width: 600px;
    margin: auto;
    background: linear-gradient(145deg, #1a1a1a, #111);
    padding: 30px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* INPUTS */
input, textarea {
    width: 100%;
    margin-bottom: 16px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #121212;
    color: #fff;
    font-size: 14px;
    transition: all 0.2s ease;
}

/* FOCUS */
input:focus, textarea:focus {
    outline: none;
    border-color: #f39c12;
    box-shadow: 0 0 0 2px rgba(243,156,18,0.2);
}

/* PLACEHOLDER */
input::placeholder,
textarea::placeholder {
    color: #aaa;
}

/* BUTTON */
button {
    width: 100%;
    background: linear-gradient(45deg, #f39c12, #e67e22);
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-weight: 700;
    color: #000;
    transition: 0.25s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(243,156,18,0.4);
}

/* ALERTS */
.alert-success {
    background: rgba(46, 204, 113, 0.15);
    color: #2ecc71;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 15px;
    border: 1px solid rgba(46,204,113,0.3);
}

.alert-error {
    background: rgba(231, 76, 60, 0.15);
    color: #e74c3c;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 15px;
    border: 1px solid rgba(231,76,60,0.3);
}

/* GRID (PRO LOOK) */
.form-row {
    display: flex;
    gap: 12px;
}

.form-row input {
    flex: 1;
}

/* MOBILE */
@media (max-width: 768px) {
    .form-row {
        flex-direction: column;
    }

    .form-box {
        padding: 20px;
    }
}
</style>

<h2 class="text-center mb-4">📅 Reserve Your Table</h2>

<div class="form-box">

    {% if success %}
        <div class="alert-success">
            Reservation successful! Check your email.
        </div>
    {% endif %}

    {% if error %}
        <div class="alert-error">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Full Name" required>

        <div class="form-row">
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="phone" placeholder="Phone" required>
        </div>

        <div class="form-row">
            <input type="date" name="date" required>
            <input type="time" name="time" required>
        </div>

        <input type="number" name="guests" placeholder="Number of Guests" required>

        <textarea name="message" placeholder="Special request (optional)"></textarea>

        <button type="submit">Reserve Now</button>
    </form>

</div>

{% endblock %}
