{% extends 'base.html' %}
{% block content %}

<style>
body {
    background: #0b0b0b;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
}

/* TITLE */
h2 {
    font-weight: 700;
}

/* FORM BOX */
.form-box {
    max-width: 600px;
    margin: auto;
    background: linear-gradient(145deg, #1a1a1a, #111);
    padding: 30px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* LABEL */
label {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 4px;
    display: block;
}

/* INPUT */
input, textarea {
    width: 100%;
    margin-bottom: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #121212;
    color: #fff;
    font-size: 14px;
    transition: all 0.2s ease;
}

/* FOCUS */
input:focus, textarea:focus {
    outline: none;
    border-color: #f39c12;
    box-shadow: 0 0 0 2px rgba(243,156,18,0.2);
}

/* DATE & TIME FIX (ICON VISIBLE) */
input[type="date"],
input[type="time"] {
    cursor: pointer;
}

input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
}

/* BUTTON */
button {
    width: 100%;
    background: linear-gradient(45deg, #f39c12, #e67e22);
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-weight: 700;
    color: #000;
    transition: 0.25s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(243,156,18,0.4);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* ALERTS */
.alert-success {
    background: rgba(46, 204, 113, 0.15);
    color: #2ecc71;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 15px;
    border: 1px solid rgba(46,204,113,0.3);
}

.alert-error {
    background: rgba(231, 76, 60, 0.15);
    color: #e74c3c;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 15px;
    border: 1px solid rgba(231,76,60,0.3);
}

/* GRID */
.form-row {
    display: flex;
    gap: 12px;
}

.form-row > div {
    flex: 1;
}

/* MOBILE */
@media (max-width: 768px) {
    .form-row {
        flex-direction: column;
    }

    .form-box {
        padding: 20px;
    }
}
</style>

<h2 class="text-center mb-4">📅 Reserve Your Table</h2>

<div class="form-box">

    <!-- SUCCESS -->
    {% if success %}
        <div class="alert-success">
            ✅ Reservation confirmed! Check your email.
        </div>
    {% endif %}

    <!-- ERROR -->
    {% if error %}
        <div class="alert-error">
            ⚠ {{ error }}
        </div>
    {% endif %}

    <!-- FORM -->
    <form method="POST" id="reserveForm">
        {% csrf_token %}

        <!-- NAME -->
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter your name" required>

        <!-- EMAIL + PHONE -->
        <div class="form-row">
            <div>
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter email" required>
            </div>
            <div>
                <label>Phone</label>
                <input type="text" name="phone" placeholder="Enter phone number" required>
            </div>
        </div>

        <!-- DATE + TIME -->
        <div class="form-row">
            <div>
                <label>Select Date</label>
                <input type="date" name="date" min="{{ today }}" required>
            </div>
            <div>
                <label>Select Time</label>
                <input type="time" name="time" min="10:00" max="23:00" required>
            </div>
        </div>

        <!-- GUESTS -->
        <label>Guests</label>
        <input type="number" name="guests" min="1" max="20" placeholder="Number of guests" required>

        <!-- MESSAGE -->
        <label>Special Request</label>
        <textarea name="message" placeholder="Optional"></textarea>

        <!-- BUTTON -->
        <button type="submit" id="submitBtn">Reserve Now</button>

    </form>

</div>

<script>
// Prevent double submit + UX
const form = document.getElementById("reserveForm");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", function() {
    btn.innerText = "Booking...";
    btn.disabled = true;
});
</script>

{% endblock %}
