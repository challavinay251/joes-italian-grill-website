<!DOCTYPE html>
<html>
<head>
    <title>Joe's Italian Grill</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding-top: 80px;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 22px;
            color: #f39c12 !important;
        }

        .nav-link {
            color: #ddd !important;
            margin-left: 15px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #f39c12 !important;
        }

        /* Clean hamburger */
        .navbar-toggler {
            border: none;
        }

        .navbar-toggler:focus {
            box-shadow: none;
        }

        /* Mobile dropdown styling */
        @media (max-width: 991px) {
            .navbar-collapse {
                background: rgba(0,0,0,0.95);
                padding: 15px;
                border-radius: 10px;
                margin-top: 10px;
            }

            .nav-link {
                margin: 10px 0;
                font-size: 16px;
            }
        }

        /* HERO */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
                        url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092');
            background-size: cover;
            background-position: center;
            padding: 120px 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 700;
        }

        .hero p {
            color: #ccc;
            font-size: 18px;
        }

        /* BUTTONS */
        .btn-warning {
            background: linear-gradient(45deg, #f39c12, #e67e22);
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 8px;
        }

        .btn-outline-light {
            padding: 10px 22px;
            border-radius: 8px;
        }

        /* CARDS */
        .card {
            background: #1a1a1a;
            border-radius: 12px;
            transition: 0.4s;
            border: none;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 20px;
        }

        .feature-box {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
        }

        .feature-box:hover {
            background: #222;
            transform: translateY(-5px);
        }

        footer {
            background: black;
            margin-top: 60px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow fixed-top">
    <div class="container d-flex align-items-center">

        <!-- BRAND (LEFT) -->
        <a class="navbar-brand me-auto" href="/">🍝 Joe's Italian Grill</a>

        <!-- RIGHT SIDE CONTROLS -->
        <div class="d-flex align-items-center">

            <!-- 🍽 Menu Button (Mobile Only, hidden on /menu/) -->
            {% if request.path != '/menu/' %}
            <a href="/menu/" class="btn btn-warning d-lg-none me-2">
                Menu
            </a>
            {% endif %}

            <!-- ☰ HAMBURGER -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

        </div>

        <!-- NAV LINKS -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/menu/">Menu</a></li>
                <li class="nav-item"><a class="nav-link" href="/gallery/">Gallery</a></li>
                <li class="nav-item"><a class="nav-link" href="/reserve/">Reservations</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </div>

    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<footer class="text-center p-3">
    <p>© 2026 Joe's Italian Grill</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
